name: Build Windows

on:
  workflow_dispatch:

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      CI: true

    steps:
      - name: Checkout repository
        shell: pwsh
        run: |
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Install Flutter
        shell: pwsh
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 C:\flutter
          "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Enable Windows desktop
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Precache Windows desktop tooling
        shell: pwsh
        run: |
          flutter precache --windows
          flutter doctor -v

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure NuGet is available
        shell: pwsh
        run: |
          $nuget = Get-Command nuget -ErrorAction SilentlyContinue
          if (-not $nuget) {
            Write-Host "nuget.exe not on PATH; downloading..."
            $nugetDir = Join-Path $env:RUNNER_TEMP "nuget"
            New-Item -ItemType Directory -Path $nugetDir -Force | Out-Null
            $nugetPath = Join-Path $nugetDir "nuget.exe"
            Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nugetPath
            $nugetDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          nuget help | Select-Object -First 1

      - name: Build portable ZIP
        shell: pwsh
        run: .\scripts\build-windows-portable.ps1

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v6
        with:
          name: OxyCapture-windows-x64
          path: dist/*.zip
          retention-days: 30
