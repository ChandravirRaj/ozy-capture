name: oxy_capture
description: Oxy Capture — desktop screenshot capture proof of concept.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  tray_manager: ^0.2.3
  window_manager: ^0.4.3
  screen_retriever: ^0.2.0
  desktop_screenshot_capture:
    path: ../packages/desktop_screenshot_capture
  desktop_screenshot_capture_macos:
    path: ../packages/desktop_screenshot_capture_macos
  desktop_screenshot_capture_windows:
    path: ../packages/desktop_screenshot_capture_windows
  desktop_screenshot_capture_linux:
    path: ../packages/desktop_screenshot_capture_linux

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.png
